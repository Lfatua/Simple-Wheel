<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择困难症终结者 · 转盘</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f0f1a;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 24px;
    letter-spacing: 2px;
    color: #c9b8ff;
    text-shadow: 0 0 20px #7c5cfc88;
  }

  .main {
    display: flex;
    gap: 36px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 960px;
  }

  /* ── Wheel ── */
  .wheel-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .canvas-container {
    position: relative;
    width: 380px;
    height: 380px;
  }

  canvas {
    border-radius: 50%;
    box-shadow: 0 0 40px #7c5cfc55, 0 0 0 4px #2a2a3e;
  }

  /* pointer arrow */
  .pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 32px solid #ff6b6b;
    filter: drop-shadow(0 2px 6px #ff6b6b99);
    z-index: 10;
  }

  #spinBtn {
    padding: 14px 48px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #7c5cfc, #c45cfc);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px #7c5cfc66;
    transition: transform .15s, box-shadow .15s, opacity .2s;
  }

  #spinBtn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px #7c5cfc88;
  }

  #spinBtn:disabled { opacity: .5; cursor: not-allowed; }

  .result-box {
    min-height: 52px;
    padding: 12px 28px;
    background: #1e1e30;
    border: 2px solid #3a3a5e;
    border-radius: 16px;
    font-size: 1.25rem;
    font-weight: 700;
    text-align: center;
    color: #ffd97d;
    letter-spacing: 1px;
    transition: all .3s;
    min-width: 260px;
  }

  .result-box.pop {
    border-color: #ffd97d;
    box-shadow: 0 0 24px #ffd97d55;
    animation: pop .35s ease;
  }

  @keyframes pop {
    0%   { transform: scale(.9); }
    60%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  /* ── Sidebar ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 280px;
    min-width: 220px;
  }

  .sidebar h2 {
    font-size: .95rem;
    color: #9090b8;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .input-row input {
    flex: 1;
    padding: 10px 14px;
    background: #1e1e30;
    border: 1.5px solid #3a3a5e;
    border-radius: 10px;
    color: #e8e8f0;
    font-size: .95rem;
    outline: none;
    transition: border-color .2s;
  }

  .input-row input:focus { border-color: #7c5cfc; }

  .input-row input::placeholder { color: #55557a; }

  .btn-add {
    padding: 10px 16px;
    background: #7c5cfc;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    transition: background .15s;
  }

  .btn-add:hover { background: #9a7aff; }

  .item-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .item-list::-webkit-scrollbar { width: 5px; }
  .item-list::-webkit-scrollbar-track { background: transparent; }
  .item-list::-webkit-scrollbar-thumb { background: #3a3a5e; border-radius: 4px; }

  .item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    background: #1e1e30;
    border: 1.5px solid #2d2d4a;
    border-radius: 10px;
    font-size: .9rem;
    animation: slideIn .2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .item .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .item .label { flex: 1; word-break: break-all; }

  .item .del {
    background: none;
    border: none;
    color: #55557a;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 6px;
    line-height: 1;
    transition: color .15s, background .15s;
  }

  .item .del:hover { color: #ff6b6b; background: #ff6b6b22; }

  .empty-hint {
    color: #444466;
    font-size: .88rem;
    text-align: center;
    padding: 20px 0;
  }

  .toolbar {
    display: flex;
    gap: 8px;
  }

  .btn-tool {
    flex: 1;
    padding: 9px;
    background: #1e1e30;
    border: 1.5px solid #3a3a5e;
    border-radius: 10px;
    color: #9090b8;
    font-size: .82rem;
    cursor: pointer;
    transition: all .15s;
  }

  .btn-tool:hover { border-color: #7c5cfc; color: #c9b8ff; }

  .saved-badge {
    font-size: .75rem;
    color: #7c5cfc;
    text-align: right;
    opacity: 0;
    transition: opacity .4s;
  }

  .saved-badge.show { opacity: 1; }
</style>
</head>
<body>

<h1>🎡 选择困难症终结者</h1>

<div class="main">
  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="canvas-container">
      <div class="pointer"></div>
      <canvas id="wheel" width="380" height="380"></canvas>
    </div>
    <button id="spinBtn" onclick="spin()">开 始 转 动</button>
    <div class="result-box" id="resultBox">等待命运的宣判…</div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>选项管理</h2>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="输入新选项…" maxlength="20"
             onkeydown="if(event.key==='Enter')addItem()">
      <button class="btn-add" onclick="addItem()" title="添加">＋</button>
    </div>

    <div class="item-list" id="itemList"></div>
    <div class="empty-hint" id="emptyHint" style="display:none">暂无选项，快添加吧！</div>

    <div class="toolbar">
      <button class="btn-tool" onclick="saveItems()">💾 保存</button>
      <button class="btn-tool" onclick="clearAll()">🗑 清空</button>
      <button class="btn-tool" onclick="shuffle()">🔀 打乱</button>
    </div>
    <div class="saved-badge" id="savedBadge">已保存到本地 ✓</div>
  </div>
</div>

<script>
// ─── Palette ──────────────────────────────────────────────
const PALETTE = [
  '#7c5cfc','#c45cfc','#fc5c8a','#fc8c5c',
  '#fcc45c','#8cfc5c','#5cfca8','#5cccfc',
  '#5c8cfc','#a85cfc','#fc5cc4','#fc5c5c',
];

// ─── State ────────────────────────────────────────────────
let items = [];
let spinning = false;
let currentAngle = 0;    // rad, top = 0

// ─── Init ─────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('wheel_items');
  if (saved) {
    try { items = JSON.parse(saved); } catch(e) { items = []; }
  }
  if (items.length === 0) {
    items = ['吃火锅','点外卖','自己做饭','随便'];
  }
  renderList();
  drawWheel();
})();

// ─── Add / Delete / Clear / Shuffle ───────────────────────
function addItem() {
  const input = document.getElementById('itemInput');
  const val = input.value.trim();
  if (!val) return;
  if (items.includes(val)) { flash(input); return; }
  items.push(val);
  input.value = '';
  renderList();
  drawWheel();
  autoSave();
}

function deleteItem(idx) {
  items.splice(idx, 1);
  renderList();
  drawWheel();
  autoSave();
}

function clearAll() {
  if (!confirm('确定清空所有选项？')) return;
  items = [];
  renderList();
  drawWheel();
  autoSave();
}

function shuffle() {
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
  renderList();
  drawWheel();
  autoSave();
}

function flash(el) {
  el.style.borderColor = '#ff6b6b';
  setTimeout(() => el.style.borderColor = '', 600);
}

// ─── Render List ──────────────────────────────────────────
function renderList() {
  const list = document.getElementById('itemList');
  const hint = document.getElementById('emptyHint');
  hint.style.display = items.length === 0 ? 'block' : 'none';
  list.innerHTML = '';
  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="dot" style="background:${PALETTE[i % PALETTE.length]}"></div>
      <span class="label">${escHtml(item)}</span>
      <button class="del" onclick="deleteItem(${i})" title="删除">✕</button>`;
    list.appendChild(div);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Save ─────────────────────────────────────────────────
function saveItems() {
  localStorage.setItem('wheel_items', JSON.stringify(items));
  const badge = document.getElementById('savedBadge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

function autoSave() {
  localStorage.setItem('wheel_items', JSON.stringify(items));
}

// ─── Draw Wheel ───────────────────────────────────────────
function drawWheel(highlightIdx = -1) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = cx - 6;
  ctx.clearRect(0, 0, W, H);

  if (items.length === 0) {
    ctx.fillStyle = '#1e1e30';
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#55557a';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('请添加选项', cx, cy);
    return;
  }

  const n = items.length;
  const arc = (Math.PI * 2) / n;

  items.forEach((item, i) => {
    const startAngle = currentAngle + i * arc - Math.PI / 2;
    const endAngle   = startAngle + arc;
    const color = PALETTE[i % PALETTE.length];

    // Sector
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = i === highlightIdx
      ? lighten(color, 40)
      : color;
    ctx.fill();
    ctx.strokeStyle = '#0f0f1a';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#00000088';
    ctx.shadowBlur = 4;
    const maxLen = Math.min(item.length, 10);
    const fontSize = maxLen <= 4 ? 18 : maxLen <= 7 ? 14 : 12;
    ctx.font = `bold ${fontSize}px 'PingFang SC','Microsoft YaHei',sans-serif`;
    const label = item.length > 10 ? item.slice(0, 9) + '…' : item;
    ctx.fillText(label, R - 14, 0);
    ctx.restore();
  });

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, Math.PI * 2);
  ctx.fillStyle = '#0f0f1a';
  ctx.fill();
  ctx.strokeStyle = '#3a3a5e';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function lighten(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

// ─── Spin ─────────────────────────────────────────────────
function spin() {
  if (spinning || items.length === 0) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const resultBox = document.getElementById('resultBox');
  resultBox.textContent = '旋转中…';
  resultBox.classList.remove('pop');

  const n = items.length;
  const arcSize = (Math.PI * 2) / n;

  // Total rotation: 5-8 full turns + random offset
  const extraTurns = (5 + Math.random() * 3) * Math.PI * 2;
  const randOffset = Math.random() * Math.PI * 2;
  const totalDelta = extraTurns + randOffset;

  const duration = 4000 + Math.random() * 1500; // 4-5.5s
  let startTime = null;
  const startAngle = currentAngle;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function frame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + totalDelta * easeOut(progress);

    // Which sector is under the pointer (top, angle = currentAngle - π/2 ... wait)
    // Pointer is at the top. The sector i starts at currentAngle + i*arc - π/2.
    // We want the sector whose range contains angle 0 (pointing up) adjusted.
    // Normalize: pointer is at -π/2 in canvas terms.
    // Sector i occupies [currentAngle + i*arc - π/2, currentAngle + (i+1)*arc - π/2]
    // We want the one that contains angle ≡ -π/2 (mod 2π), i.e., 3π/2 in [0,2π].
    const norm = ((- currentAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
    const idx = Math.floor(norm / arcSize) % n;
    drawWheel(progress === 1 ? idx : -1);

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      // Final result
      const finalNorm = ((- currentAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      const finalIdx  = Math.floor(finalNorm / arcSize) % n;
      drawWheel(finalIdx);
      resultBox.textContent = '🎉 ' + items[finalIdx];
      resultBox.classList.add('pop');
    }
  }

  requestAnimationFrame(frame);
}
</script>
</body>
</html>
